# Configuration shared across all machine types.
# Per-machine-type overrides go in machine_types/<type>/machinekit.toml.

# Uncomment and edit to activate modules. Order doesn't matter — dependencies
# resolve automatically. A machine_types/<type>/machinekit.toml that sets its own
# `modules` replaces this list; to add modules on top of it instead, set
# `additional_modules` there.
#
# modules = [
#   "git",
#   "age",
#   "brewfile",
#   "mise",
#   "zsh",
# ]

# Per-module config. Use [module.<name>] for each activated module that needs it.
#
# [module.git]
# user_name  = "Your Name"
# user_email = "you@example.com"
#
# [module.age]
# key_path = "~/.config/age/key.txt"  # default; override only if needed
# # Where the age key itself comes from: "file" (copied via --existing-age-key-file
# # or generated via --generate-age-key; the default) or "secrets_manager" (fetched
# # from the active manager — see [module.infisical] below). Under "secrets_manager"
# # the key is just the "age_key" secret: give it an explicit reference in
# # [secrets.manager_refs] below, or rely on the convention name "age_key".
# key_source_type = "file"
#
# [module.infisical]
# # Source any named secret (a tailscale key, a hindsight key, a git_backup
# # ssh_key, even the age key) from Infisical Cloud instead of the age pool. See
# # docs/modules.md for the one-time account + machine-identity setup. Listing
# # this makes machinekit authenticate to Infisical during preflight, `secrets
# # list`, and an interactive `secrets put` — a network call, and for `user` auth
# # a browser login when your (~10-day) session has lapsed.
# auth_method = "universal"       # "universal" (machine identity, headless) or
#                                 # "user" (browser/SSO, interactive only) —
#                                 # typically set per machine_type
# client_id = "..."               # universal auth only; non-sensitive, safe to commit.
#                                 # The client SECRET is provided at apply time via
#                                 # MACHINEKIT_INFISICAL_CLIENT_SECRET, never here.
# default_project_id = "..."      # fallback project for by-convention names; an
#                                 # explicit reference below may point elsewhere
# environment = "prod"            # default environment for by-convention names
#
# [secrets.manager_refs]
# # Map a specific secret to an explicit Infisical reference. The last segment is
# # the secret name; any segments before it are its Infisical folder path, which
# # defaults to the project root:
# #   infisical://<projectId>/<env>/<name>         — a secret at the root
# #   infisical://<projectId>/<env>/<path>/<name>  — a secret inside a folder
# # Unmapped names fall back to a convention key — the name upcased with
# # slashes→underscores — looked up in default_project_id/environment; machinekit
# # verifies the manager actually holds it, so a name in neither the pool nor the
# # manager reads as missing.
# "tailscale/default" = "infisical://<projectId>/prod/TAILSCALE_DEFAULT"
# # The age key (when [module.age] key_source_type = "secrets_manager") is the
# # "age_key" secret — reference it explicitly here, or rely on its convention key.
# "age_key" = "infisical://<projectId>/prod/age_key"
#
# [module.postgres]
# # By default (no config) postgres manages the host's port-5432 instance,
# # installing the latest major if none exists. To pin specific majors to
# # specific ports, list them — every entry needs both a version and a port,
# # and exactly one must be 5432 (the instance consumers use). machinekit
# # installs whichever are missing and verifies the rest; it never changes the
# # port of an already-installed cluster, so a request must include every
# # installed version (matching its current port) and may add more.
# [[module.postgres.versions]]
# version = "18"
# port = "5432"
# [[module.postgres.versions]]
# version = "17"
# port = "5433"
#
# [module.hindsight_server]
# # Self-hosted Hindsight memory API, run as a container against the host
# # postgres (both pulled in automatically as dependencies). List
# # "hindsight_server" in `modules` only on the machine that should be the
# # memory server.
# #
# # `llm_provider` is required — there is no default; pick the provider whose
# # key you supply below.
# llm_provider = "anthropic"
# # Optional overrides (unset → Hindsight's own default for that setting):
# # llm_model    = "claude-opus-4-8"
# # llm_base_url = "https://example.openai.azure.com/..."  # override the provider API base URL (Azure OpenAI, a local endpoint, …)
# # image     = "ghcr.io/vectorize-io/hindsight:latest"
# # db_name   = "hindsight"
# # db_user   = "hindsight"
# # api_port  = "8888"   # host port for the memory API
# # ui_port   = "9999"   # host port for the control-plane web UI
# #
# # Secrets are named hindsight/* — an age-encrypted pool file at
# # secrets/hindsight/<name>.age, or a secrets-manager reference (see
# # [module.infisical]), whichever backend holds each — not the home pipeline:
# #   hindsight/llm_api_key     (required — machinekit can't make one)
# #   hindsight/tenant_api_key  (optional — generated if absent)
# #   hindsight/db_password     (optional — generated if absent)
# #   hindsight/cp_access_key   (optional — password gating the web UI; see below)
# # machinekit assembles them into a create-once ~/.config/hindsight/hindsight.env
# # (mode 600): the container's env_file and the record of any generated values.
# # To regenerate, delete that file and re-apply. When the tenant key is generated
# # it is announced — persist it as the hindsight/tenant_api_key secret (into the
# # pool or your manager) and share it with your other boxes (every hindsight
# # machine must use the same one).
# #
# # The control-plane web UI is always password-gated (HINDSIGHT_CP_ACCESS_KEY).
# # The password resolves to: the hindsight/cp_access_key secret if whichever
# # backend holds it (pool file or manager reference) has it, else a password you
# # type at an interactive apply (blank to generate), else a generated one on a
# # non-interactive run. A generated one is announced so you can retrieve it from
# # hindsight.env to sign in.
#
# [module.hindsight_integration]
# # Wires this machine's coding agents to a Hindsight memory server. List
# # "hindsight_integration" in `modules` on every machine that should recall/
# # retain, and choose which agents with `integrations` (Hindsight integrates with
# # many MCP agents; each is set up by its own submodule).
# #
# # Point it at the server with EITHER server_host (shorthand: a reachable host,
# # typically its tailnet MagicDNS name — built into http://<host>:<api_port>) OR
# # server_url (a full URL used verbatim — for https, a path, or a hosted Hindsight
# # with no server in your own fleet). One is required; server_url wins if both set.
# server_host = "memory-server"
# # server_url = "https://hindsight.example.com"
# integrations = ["claude_code"]
# # api_port = "8888"
# #
# # Coding agents get a dynamic per-project bank named "<bank_id_prefix>-<repo>"
# # (auto recall/retain). bank_id_prefix defaults to "coding".
# # bank_id_prefix = "coding"
# #
# # Extra banks beyond the per-project one, by name. A bank in auto_recall_banks
# # is folded into every session's recall (read-only); a bank in tool_use_banks is
# # exposed as its own MCP server with read/write tools (a per-session context
# # cost — opt in deliberately). List a bank in both for read-and-write.
# # auto_recall_banks = ["shared", "reference"]
# # tool_use_banks = ["shared"]
# #
# # The fleet-shared tenant key is the same hindsight/tenant_api_key secret the
# # server uses (pool or manager; generated if absent — this box may be the
# # first). machinekit assembles it, with the server URL, into each agent's
# # config (e.g. ~/.hindsight/claude-code.json, mode 600), create-once. To repoint
# # at a different server or regenerate, delete the config(s) and re-apply.
# #
# # Bank missions/dispositions — apply the tenant-wide config for named banks from
# # this machine. Banks are tenant-scoped (not per-machine): any box carrying an
# # additional_banks.<name> table re-asserts it on apply, and the upsert is
# # idempotent — so list these on whichever box you want to own the config (a
# # server that also runs this module, or any client). Each table is sent verbatim
# # to the server's bank-config API using Hindsight's own field names:
# # retain_mission / observations_mission / reflect_mission, and disposition traits
# # disposition_skepticism / disposition_literalism / disposition_empathy (1–5).
# # A bank named here is independent of the recall/tool_use lists above.
# #
# # This writes to the tenant (an upsert that can overwrite a bank's config), so it
# # needs explicit consent: an interactive yes, or
# # MACHINEKIT_HINDSIGHT_INTEGRATION_CONFIGURE_BANKS=1 unattended. Auth is the same
# # fleet tenant key, read-only here — so it must already be shared (pool/manager),
# # not just freshly generated. If the server isn't reachable yet, config is skipped
# # and lands on the next apply.
# # tenant = "default"       # the tenant path segment; override only for multi-tenant
# #
# # [module.hindsight_integration.additional_banks.music]
# # retain_mission = "Extract creative direction, influences, works in progress. Ignore software details."
# # reflect_mission = "You are a creative collaborator who knows my musical sensibility."
# # disposition_skepticism = 2
# # disposition_literalism = 1
# # disposition_empathy = 5
#
# [module.agents_config_setup]
# # Ensures the shared agents-config directory is on this machine, seeding it from
# # a source when it's absent. Owns the canonical `dir` key (default
# # ~/.agents) that agents_config_harnesses reads — one source of truth, so
# # there's no second path to keep in sync.
# #
# # `source` is where to seed an absent dir from: a git URL, a local git repo, or
# # a plain directory to copy (same source handling as the blueprints fetch). A
# # private git source needs SSH access set up, like blueprints. Seeding only fills
# # an absent/empty dir; an already-populated dir is left untouched.
# source = "git@github.com:you/agents.git"
# # dir = "~/.agents"        # override only to use a non-default location
# # source_protocol = "git"         # "git" or "cp"; override only if auto-detection guesses wrong
#
# [module.agents_config_harnesses]
# # Projects a shared agents-config directory into your coding agents so they all
# # load the same instructions and skills. The directory (default ~/.agents)
# # holds a top-level AGENTS.md (instructions loaded every session) and a
# # skills/<name>/SKILL.md folder (skills the agent loads when relevant). List
# # "agents_config_harnesses" in `modules` and pick agents with `harnesses` (each
# # set up by its own submodule). Available: claude_code, codex, opencode, openclaw,
# # hermes. Optional — omit or leave empty to project nothing.
# harnesses = ["claude_code", "codex", "opencode"]
# #
# # For Claude Code this symlinks ~/.claude/skills → <dir>/skills and adds an
# # `@<dir>/AGENTS.md` import to ~/.claude/CLAUDE.md. Codex and opencode read skills
# # from <dir> natively, so for them it is just a symlink of their global AGENTS.md
# # (~/.codex/AGENTS.md, ~/.config/opencode/AGENTS.md) to <dir>/AGENTS.md. openclaw
# # and hermes are persistent-assistant CLIs: openclaw symlinks the identity files
# # (SOUL.md, IDENTITY.md, USER.md), AGENTS.md, and skills into ~/.openclaw/workspace;
# # hermes symlinks the one file it reads, ~/.hermes/SOUL.md. Every binding is
# # idempotent, projects a file only once you've authored it, and refuses to
# # overwrite a pre-existing real file in its place. The directory itself must
# # already exist — populate it yourself, or sync it onto the machine.
# #
# # The directory is the one owned by [module.agents_config_setup] above (its
# # `dir` key, default ~/.agents) — shared config, one source of truth.
# # agents_config_setup can put the directory on the machine; this module only
# # reads it. The two are independent — use either alone or both together.
#
# [module.tailscale]
# # Omit `tag` on a user device (laptop): installs the client (GUI app on
# # macOS); you sign in yourself.
# # Set `tag` on a headless service device: installs the daemon and joins the
# # tailnet itself using an OAuth secret — an age-encrypted pool file or a secrets
# # manager (see [module.infisical]); machinekit pulls in whichever backend holds it.
# tag = "server"
# # `hostname` pins this device's tailnet (MagicDNS) name when machinekit joins it
# # (tagged devices only). Set it to the name other machines will use to reach
# # this box — e.g. a memory server's `hostname` here matches the clients'
# # [module.hindsight_integration] server_host. Omit to keep the OS hostname.
# hostname = "memory-server"
# # `tailnet` is your label for which tailnet's secret to use; omit it for the
# # default tailnet. The secret is named tailscale/<tailnet> — an age-encrypted
# # pool file at secrets/tailscale/<tailnet>.age (a sibling of common/ and
# # machine_types/), or a manager reference (see [module.infisical]).
# tailnet = "work"
#
# [module.syncthing]
# # Generic peer-to-peer folder sync. `discovery` defaults to "tailnet": the daemon
# # is hardened off all public/broadcast discovery, so peers need static addresses
# # (typically tailnet MagicDNS names) on the same tailnet. Set discovery =
# # "default" to keep Syncthing's own discovery for LAN or relay topologies.
# discovery = "tailnet"
# #
# # Syncthing can leave *.sync-conflict-* files when two machines edit the same
# # file; machinekit runs a periodic scan that surfaces them. `interval` is the
# # scan period in seconds; `notify` is a command run with a message when
# # conflicts are found (default: logger/journald).
# # interval = 300
# # notify = "/path/to/notify-hook"
# #
# # Hub-and-spoke. Mark ONE always-on machine `hub = true`: it accepts joiners that
# # connect (discovering their device IDs) instead of pre-listing them. Every other
# # machine is a client that lists only the hub. Joining is consent-gated (confirm
# # interactively, or set MACHINEKIT_SYNCTHING_JOIN=1); until then the daemon idles
# # with folders local-only. Apply the hub first to read its device ID, give that ID
# # to the clients, apply them, then re-apply the hub to approve the joiners.
# #
# # Folders (both hub and clients): each needs an `id` (stable + identical across
# # machines for the same folder) and a `path`.
# [[module.syncthing.folders]]
# id = "agents"
# path = "~/.agents"
# # Each folder gets a machinekit-managed .stignore by default, holding
# # (?d).DS_Store and other junk that should never replicate. Per folder you can:
# # ignore_patterns = ["*.tmp"]     # your patterns (kept above the defaults)
# # add_default_ignores = false     # drop machinekit's built-in junk defaults
# # manage_stignore = false         # leave .stignore entirely to you
# #
# # --- ON THE HUB ---
# hub = true
# #
# # --- ON EACH CLIENT (instead of `hub = true`): list only the hub. ---
# # introducer = true means "learn the other clients through the hub", so you never
# # list client-to-client peers.
# # [[module.syncthing.peers]]
# # device_id = "PUT-THE-HUBS-DEVICE-ID-HERE"
# # address = "tcp://server:22000"   # the hub's tailnet address, or "dynamic"
# # introducer = true
#
# [module.git_backup]
# # Periodically pushes one or more working dirs to git remotes, giving a live,
# # replicated dir (e.g. one Syncthing keeps in sync, which propagates deletions
# # and so isn't itself a backup) durable history. Generic — it backs up whatever
# # folders you list and knows nothing about what's in them. One service runs for
# # all folders. Each folder is single-writer: back a given folder up from EXACTLY
# # ONE machine (usually the always-on server), or the machines race its branch.
# #
# # `ssh_key` (module default; per-folder override below) names a secret at
# # git_backup/ssh_keys/<name> — an age-encrypted pool file
# # (secrets/git_backup/ssh_keys/<name>.age) or a secrets-manager reference (see
# # [module.infisical]) — any key with push access (a deploy key, your own key).
# # machinekit resolves it (pulling in whichever backend holds it) and pushes with
# # it. Omit it to push over ambient SSH.
# ssh_key = "agents"
# # interval = 300                  # seconds between backup runs
# # notify = "/path/to/notify-hook" # run with a message on trouble; default: logger/journald
# #
# # Each folder needs a `path` and a `remote`. It also gets a machinekit-managed
# # .gitignore by default, holding .DS_Store and — importantly — .stversions/
# # (Syncthing's version buffer), which git would otherwise commit. So pairing the
# # syncthing folder above with this one just works; you don't list .stversions/.
# [[module.git_backup.folders]]
# path = "~/.agents"
# remote = "git@github.com:you/agents.git"
# # ssh_key = "agents"             # override the module default for this folder
# # ignore_patterns = ["build/"]   # your patterns (kept above the defaults)
# # add_default_ignores = false    # drop machinekit's built-in junk defaults
# # manage_gitignore = false       # leave .gitignore entirely to you
