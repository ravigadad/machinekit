# Configuration shared across all machine types.
# Per-machine-type overrides go in machine_types/<type>/machinekit.toml.

# Uncomment and edit to activate modules. Order doesn't matter — dependencies
# resolve automatically.
#
# modules = [
#   "git",
#   "age",
#   "brewfile",
#   "mise",
#   "zsh",
# ]

# Per-module config. Use [module.<name>] for each activated module that needs it.
#
# [module.git]
# user_name  = "Your Name"
# user_email = "you@example.com"
#
# [module.age]
# key_path = "~/.config/age/key.txt"  # default; override only if needed
#
# [module.postgres]
# # By default (no config) postgres manages the host's port-5432 instance,
# # installing the latest major if none exists. To pin specific majors to
# # specific ports, list them — every entry needs both a version and a port,
# # and exactly one must be 5432 (the instance consumers use). machinekit
# # installs whichever are missing and verifies the rest; it never changes the
# # port of an already-installed cluster, so a request must include every
# # installed version (matching its current port) and may add more.
# [[module.postgres.versions]]
# version = "18"
# port = "5432"
# [[module.postgres.versions]]
# version = "17"
# port = "5433"
#
# [module.hindsight_server]
# # Self-hosted Hindsight memory API, run as a container against the host
# # postgres (both pulled in automatically as dependencies). List
# # "hindsight_server" in `modules` only on the machine that should be the
# # memory server.
# #
# # `llm_provider` is required — there is no default; pick the provider whose
# # key you supply below.
# llm_provider = "anthropic"
# # Optional overrides (unset → Hindsight's own default for that setting):
# # llm_model    = "claude-opus-4-8"
# # llm_base_url = "https://example.openai.azure.com/..."  # override the provider API base URL (Azure OpenAI, a local endpoint, …)
# # image     = "ghcr.io/vectorize-io/hindsight:latest"
# # db_name   = "hindsight"
# # db_user   = "hindsight"
# # api_port  = "8888"   # host port for the memory API
# # ui_port   = "9999"   # host port for the control-plane web UI
# #
# # Secrets come from the blueprint pool (secrets/hindsight/*.age), one raw value
# # per file — not the home pipeline:
# #   secrets/hindsight/llm_api_key.age     (required — machinekit can't make one)
# #   secrets/hindsight/tenant_api_key.age  (optional — generated if absent)
# #   secrets/hindsight/db_password.age     (optional — generated if absent)
# #   secrets/hindsight/cp_access_key.age   (optional — password gating the web UI;
# #                                          see below)
# # machinekit assembles them into a create-once ~/.config/hindsight/hindsight.env
# # (mode 600): the container's env_file and the record of any generated values.
# # To regenerate, delete that file and re-apply. When the tenant key is generated
# # it is announced — save it into secrets/hindsight/tenant_api_key.age and share
# # it with your other boxes (every hindsight machine must use the same one).
# #
# # The control-plane web UI is always password-gated (HINDSIGHT_CP_ACCESS_KEY).
# # The password resolves to: the cp_access_key.age pool secret if present, else a
# # password you type at an interactive apply (blank to generate), else a generated
# # one on a non-interactive run. A generated one is announced so you can retrieve
# # it from hindsight.env to sign in.
#
# [module.hindsight_integration]
# # Wires this machine's coding agents to a Hindsight memory server. List
# # "hindsight_integration" in `modules` on every machine that should recall/
# # retain, and choose which agents with `integrations` (Hindsight integrates with
# # many MCP agents; each is set up by its own submodule).
# #
# # Point it at the server with EITHER server_host (shorthand: a reachable host,
# # typically its tailnet MagicDNS name — built into http://<host>:<api_port>) OR
# # server_url (a full URL used verbatim — for https, a path, or a hosted Hindsight
# # with no server in your own fleet). One is required; server_url wins if both set.
# server_host = "memory-server"
# # server_url = "https://hindsight.example.com"
# integrations = ["claude_code"]
# # api_port = "8888"
# #
# # Coding agents get a dynamic per-project bank named "<bank_id_prefix>-<repo>"
# # (auto recall/retain). bank_id_prefix defaults to "coding".
# # bank_id_prefix = "coding"
# #
# # Extra banks beyond the per-project one, by name. A bank in auto_recall is
# # folded into every session's recall (read-only); a bank in tool_use is exposed
# # as its own MCP server with read/write tools (a per-session context cost — opt
# # in deliberately). List a bank in both for read-and-write.
# # additional_banks.auto_recall = ["shared", "reference"]
# # additional_banks.tool_use = ["shared"]
# #
# # The fleet-shared tenant key comes from the same pool secret the server uses,
# # secrets/hindsight/tenant_api_key.age (generated if absent — this box may be
# # the first). machinekit assembles it, with the server URL, into each agent's
# # config (e.g. ~/.hindsight/claude-code.json, mode 600), create-once. To repoint
# # at a different server or regenerate, delete the config(s) and re-apply.
#
# [module.agents_config_setup]
# # Ensures the shared agents-config directory is on this machine, seeding it from
# # a source when it's absent. Owns the canonical `dir` key (default
# # ~/.config/agents) that agents_config_harnesses reads — one source of truth, so
# # there's no second path to keep in sync.
# #
# # `source` is where to seed an absent dir from: a git URL, a local git repo, or
# # a plain directory to copy (same source handling as the blueprints fetch). A
# # private git source needs SSH access set up, like blueprints. Seeding only fills
# # an absent/empty dir; an already-populated dir is left untouched.
# source = "git@github.com:you/agents.git"
# # dir = "~/.config/agents"        # override only to use a non-default location
# # source_protocol = "git"         # "git" or "cp"; override only if auto-detection guesses wrong
#
# [module.agents_config_harnesses]
# # Projects a shared agents-config directory into your coding agents so they all
# # load the same instructions and skills. The directory (default ~/.config/agents)
# # holds a top-level AGENTS.md (instructions loaded every session) and a
# # doctrine/<name>/SKILL.md folder (skills the agent loads when relevant). List
# # "agents_config_harnesses" in `modules` and pick agents with `harnesses` (each
# # set up by its own submodule). Optional — omit or leave empty to project nothing.
# harnesses = ["claude_code"]
# #
# # For Claude Code this symlinks ~/.claude/skills → <dir>/doctrine and adds an
# # `@<dir>/AGENTS.md` import to ~/.claude/CLAUDE.md (both idempotent; it refuses to
# # overwrite a pre-existing real ~/.claude/skills directory). The directory itself
# # must already exist — populate it yourself, or sync it onto the machine.
# #
# # The directory is the one owned by [module.agents_config_setup] above (its
# # `dir` key, default ~/.config/agents) — shared config, one source of truth.
# # agents_config_setup can put the directory on the machine; this module only
# # reads it. The two are independent — use either alone or both together.
#
# [module.tailscale]
# # Omit `tag` on a user device (laptop): installs the client (GUI app on
# # macOS); you sign in yourself.
# # Set `tag` on a headless service device: installs the daemon and joins the
# # tailnet itself using an age-encrypted OAuth secret. Requires the age module.
# tag = "server"
# # `hostname` pins this device's tailnet (MagicDNS) name when machinekit joins it
# # (tagged devices only). Set it to the name other machines will use to reach
# # this box — e.g. a memory server's `hostname` here matches the clients'
# # [module.hindsight_integration] server_host. Omit to keep the OS hostname.
# hostname = "memory-server"
# # `tailnet` is your label for which tailnet's secret to use; omit it for the
# # default tailnet. The secret lives in the blueprint-global secrets pool — a
# # sibling of common/ and machine_types/, not inside either:
# #   secrets/tailscale/<tailnet>.age
# tailnet = "work"
