name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Homebrew 6.0 made install-plan confirmation ("proceed? [y/n]") the default,
# which hangs a non-interactive runner the moment a formula pulls in deps.
env:
  HOMEBREW_NO_ASK: "1"

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      # We're going to use homebrew to install all dependencies,
      # since that's what machinekit itself uses; reduce the number
      # of things that can drift.
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@main
      # This step automatically happens when run in github, but local
      # simulation via `act` needs it explicitly set.
      - name: Add Homebrew to PATH
        run: echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
      - name: Install dependency formulas
        run: brew install bats-core jq toml2json
      - name: Run tests
        run: scripts/test
